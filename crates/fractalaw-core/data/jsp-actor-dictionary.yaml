- label: "MoD: Single Service Safety Adviser"
  type: governed
  category: MoD-Safety
  regex_patterns:
    - "[Ss]ingle [Ss]ervice [Ss]afety [Aa]dviser"
    - "\\bSSSA\\b"
  triggers: [single service safety adviser, sssa]

