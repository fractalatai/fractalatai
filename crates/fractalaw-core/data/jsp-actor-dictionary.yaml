# ── Operational Chain ───────────────────────────────────────────────

- label: "MoD: Commanding Officer"
  type: governed
  category: MoD-Operational
  regex_patterns:
    - "[Cc]ommanding [Oo]fficer"
    - "\\bCO\\b"
  triggers: [commanding officer, co, unit commander]

- label: "MoD: Head of Establishment"
  type: governed
  category: MoD-Operational
  regex_patterns:
    - "[Hh]ead of [Ee]stablishment"
    - "\\bHoE\\b"
  triggers: [head of establishment, hoe]

- label: "MoD: Commander/Manager"
  type: governed
  category: MoD-Operational
  regex_patterns:
    - "(?:commander|manager|line manager)"
  triggers: [commander, manager, line manager]

- label: "MoD: User"
  type: governed
  category: MoD-Operational
  regex_patterns:
    - "\\b[Uu]ser\\b"
  triggers: [user, military user]

- label: "MoD: Operator"
  type: governed
  category: MoD-Operational
  regex_patterns:
    - "\\b[Oo]perator\\b"
  triggers: [operator, equipment operator]

