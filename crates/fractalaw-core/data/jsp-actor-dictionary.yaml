# JSP Actor Dictionary — MoD Organisational Roles
#
# Separate from the legislative actor dictionary. JSPs assign
# organisational responsibilities (SRO, ODH, CO, AP) within an
# existing legal framework — not Hohfeldian duty/right positions.
#
# Same format as actor-dictionary.yaml: label, type, category,
# regex_patterns, triggers. Loaded separately at compile time.
#
# Ordering matters: specific entries before generic.
# regex_patterns get boundary wrappers at compile time.
#
# Categories: MoD-Ministerial, MoD-Senior, MoD-Military,
# MoD-Safety, MoD-Operational, MoD-Technical, MoD-Environment,
# MoD-Supply, MoD-Finance, MoD-Org

# ── Ministerial / Senior ────────────────────────────────────────────

- label: "MoD: Secretary of State for Defence"
  type: government
  category: MoD-Ministerial
  regex_patterns:
    - "Secretary of State(?:\\s+for Defence)?"
  triggers: [secretary of state for defence, sos(def)]

- label: "MoD: Permanent Under-Secretary"
  type: government
  category: MoD-Senior
  regex_patterns:
    - "Permanent Under[- ]Secretary"
    - "\\bPUS\\b"
  triggers: [permanent under-secretary, pus]

- label: "MoD: Chief of Defence Staff"
  type: government
  category: MoD-Military
  regex_patterns:
    - "Chief of Defence Staff"
    - "\\bCDS\\b"
  triggers: [chief of defence staff, cds]

# ── Safety Governance ───────────────────────────────────────────────

- label: "MoD: Defence Safety Authority"
  type: government
  category: MoD-Safety
  regex_patterns:
    - "Defence Safety Authority"
    - "\\bDSA\\b"
  triggers: [defence safety authority, dsa]

- label: "MoD: Senior Duty Holder"
  type: governed
  category: MoD-Safety
  regex_patterns:
    - "[Ss]enior [Dd]uty [Hh]older"
    - "\\bSDH\\b"
  triggers: [senior duty holder, sdh]

- label: "MoD: Operating Duty Holder"
  type: governed
  category: MoD-Safety
  regex_patterns:
    - "[Oo]perating [Dd]uty [Hh]older"
    - "\\bODH\\b"
  triggers: [operating duty holder, odh]

- label: "MoD: Duty Holder"
  type: governed
  category: MoD-Safety
  regex_patterns:
    - "[Dd]uty [Hh]older"
  triggers: [duty holder, dutyholder, dh]

- label: "MoD: Unit Safety Officer"
  type: governed
  category: MoD-Safety
  regex_patterns:
    - "[Uu]nit [Ss]afety [Oo]fficer"
    - "\\bUSO\\b"
  triggers: [unit safety officer, uso, safety officer]

- label: "MoD: Safety Case Author"
  type: governed
  category: MoD-Safety
  regex_patterns:
    - "[Ss]afety [Cc]ase [Aa]uthor"
  triggers: [safety case author]

- label: "MoD: Independent Safety Adviser"
  type: governed
  category: MoD-Safety
  regex_patterns:
    - "[Ii]ndependent [Ss]afety [Aa]dviser"
    - "\\bISA\\b"
  triggers: [independent safety adviser, isa]

- label: "MoD: Safety Committee"
  type: governed
  category: MoD-Safety
  regex_patterns:
    - "[Ss]afety [Cc]ommittee"
    - "[Hh]ealth and [Ss]afety [Cc]ommittee"
