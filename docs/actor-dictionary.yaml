# Actor Dictionary — Single Source of Truth
#
# Each entry: canonical label + trigger phrases for fuzzy matching.
# LLMs output natural language actor names. The matcher resolves
# them to canonical labels using these triggers.
#
# Ordering matters: specific entries before generic (e.g., "Secretary
# of State for Defence" before "Secretary of State"). The matcher
# checks in order and takes the first exact trigger match.
#
# Categories: Gvt (government), EU, Org (organisation), Ind (individual),
# SC (supply chain), Spc (specialist), Svc (service), Public, Offshore

