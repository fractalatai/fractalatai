# Actor Dictionary — Single Source of Truth
#
# Unified format: each entry has a canonical label, type (government/governed),
# category, regex patterns for text extraction, triggers for LLM matching,
# and optional drrp_keywords (downcased fragments for has_government_actor())
# and families (for specialist family-gated patterns).
#
# Ordering matters: specific entries before generic (e.g., "Secretary
# of State for Defence" before "Secretary of State"). The regex matcher
# checks in order and takes the first match.
#
# regex_patterns are the CORE patterns — boundary wrappers are added at
# compile time: (?:[\s[:punct:]]) on each side.
#
# Categories: Gvt (government), EU, Org (organisation), Ind (individual),
# SC (supply chain), Spc (specialist), Svc (service), Public, Offshore

